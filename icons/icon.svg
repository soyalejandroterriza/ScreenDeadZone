<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Screen Bezel/Border Gradient -->
    <linearGradient id="bezel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Dead Zone Green Gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Monitor Base -->
  <path d="M 44 110 L 84 110 L 80 96 L 48 96 Z" fill="#334155" />
  <rect x="52" y="94" width="24" height="12" fill="#475569" rx="2" />
  <ellipse cx="64" cy="110" rx="30" ry="6" fill="#1e293b" opacity="0.5" />

  <!-- Outer Monitor Bezel -->
  <rect x="14" y="14" width="100" height="80" rx="8" fill="url(#bezel-grad)" stroke="#1e293b" stroke-width="2" />

  <!-- Inner Screen Display -->
  <rect x="20" y="20" width="88" height="68" rx="4" fill="url(#bg-grad)" />

  <!-- Web Page Grid Placeholder (Subtle) -->
  <g opacity="0.15">
    <rect x="26" y="26" width="36" height="6" rx="1" fill="#cbd5e1" />
    <rect x="66" y="26" width="36" height="6" rx="1" fill="#cbd5e1" />
    <rect x="26" y="36" width="76" height="4" rx="1" fill="#94a3b8" />
    <rect x="26" y="44" width="76" height="4" rx="1" fill="#94a3b8" />
    <rect x="26" y="52" width="50" height="4" rx="1" fill="#94a3b8" />
  </g>

  <!-- Dead Zone (Bottom of screen overlay) -->
  <rect x="20" y="64" width="88" height="24" rx="2" fill="url(#green-grad)" opacity="0.9" />

  <!-- Warning Stripes inside Dead Zone -->
  <g opacity="0.3">
    <line x1="25" y1="88" x2="45" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="45" y1="88" x2="65" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="65" y1="88" x2="85" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="85" y1="88" x2="105" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Percentage text glow representing active extension -->
  <rect x="49" y="70" width="30" height="12" rx="3" fill="#14532d" opacity="0.8" />
  <text x="64" y="79" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="bold" fill="#4ade80" text-anchor="middle">DZ</text>
</svg>
